name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          registry-url: "https://registry.npmjs.org"

      - name: Install linter
        run: cd packages/skillcheck && npm ci

      - name: Build linter
        run: cd packages/skillcheck && npm run build

      - name: Validate all skills and rubrics (skillcheck)
        run: node packages/skillcheck/bin/skillcheck.js skills/

      - name: Validate all skills (agnix)
        run: npx agnix skills/

      - name: Publish to npm
        run: cd packages/skillcheck && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Generate checksums
        run: |
          cd packages/skillcheck
          TARBALL=$(npm pack --json | jq -r '.[0].filename')
          sha256sum "$TARBALL" > checksums-sha256.txt
          echo "TARBALL=$TARBALL" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            packages/skillcheck/${{ env.TARBALL }}
            packages/skillcheck/checksums-sha256.txt
