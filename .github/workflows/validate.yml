name: Validate Skills

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [18, 20, 22]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install linter
        run: npm ci
        working-directory: packages/skillcheck

      - name: Build linter
        run: npm run build
        working-directory: packages/skillcheck

      - name: Run linter tests
        run: npm test
        working-directory: packages/skillcheck

      - name: Validate all skills and rubrics (skillcheck)
        run: node packages/skillcheck/bin/skillcheck.js skills/

      - name: Validate all skills (agnix)
        run: npx agnix skills/
