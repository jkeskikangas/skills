name: Validate Skills

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [18, 20, 22, 24]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install linter
        run: npm ci
        working-directory: packages/skillcheck

      - name: Build linter
        run: npm run build
        working-directory: packages/skillcheck

      - name: Run linter tests
        run: npm test
        working-directory: packages/skillcheck

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run scorer tests (reviewing-skills)
        run: python skills/reviewing-skills/scripts/score_test.py

      - name: Verify rubric linter pin resolves
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          PIN=$(grep -oE '@jkeskikangas/skillcheck@[0-9]+\.[0-9]+\.[0-9]+' skills/reviewing-skills/references/skills-rubric.md | head -1)
          echo "Pinned linter: $PIN"
          npm view "$PIN" version

      - name: Validate all skills and rubrics (skillcheck)
        run: node packages/skillcheck/bin/skillcheck.js skills/

      - name: Validate all skills (agnix)
        run: npx agnix skills/
