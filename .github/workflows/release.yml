name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install linter
        run: npm ci
        working-directory: packages/skillcheck

      - name: Build linter
        run: npm run build
        working-directory: packages/skillcheck

      - name: Run linter tests
        run: npm test
        working-directory: packages/skillcheck

      - name: Validate all skills and rubrics (skillcheck)
        run: node packages/skillcheck/bin/skillcheck.js skills/

      - name: Validate all skills (agnix)
        run: npx agnix skills/

      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi
        working-directory: packages/skillcheck

      - name: Upgrade npm (Trusted Publishing)
        run: |
          npm i -g npm@11.5.1
          npm --version

      - name: Publish to npm
        run: npm publish --provenance --access public
        working-directory: packages/skillcheck

      - name: Generate checksums
        run: |
          cd packages/skillcheck
          TARBALL=$(npm pack --json | jq -r '.[0].filename')
          sha256sum "$TARBALL" > checksums-sha256.txt
          echo "TARBALL=$TARBALL" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            packages/skillcheck/${{ env.TARBALL }}
            packages/skillcheck/checksums-sha256.txt
